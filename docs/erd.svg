<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="600" y="35" font-family="system-ui, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#0f172a">AML Solution Accelerator - Entity Relationship Diagram</text>
  
  <!-- Section: Core Entities -->
  <rect x="30" y="55" width="760" height="280" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="50" y="80" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e40af">CORE ENTITIES</text>
  
  <!-- CUSTOMERS table -->
  <g filter="url(#shadow)">
    <rect x="50" y="100" width="180" height="160" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="50" y="100" width="180" height="32" rx="8" fill="#3b82f6"/>
    <text x="140" y="122" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">CUSTOMERS</text>
    <text x="60" y="150" font-family="monospace" font-size="11" fill="#0f172a">customer_id (PK)</text>
    <text x="60" y="168" font-family="monospace" font-size="11" fill="#64748b">customer_type</text>
    <text x="60" y="186" font-family="monospace" font-size="11" fill="#64748b">risk_rating</text>
    <text x="60" y="204" font-family="monospace" font-size="11" fill="#64748b">risk_score</text>
    <text x="60" y="222" font-family="monospace" font-size="11" fill="#64748b">pep_flag</text>
    <text x="60" y="240" font-family="monospace" font-size="11" fill="#64748b">kyc_status</text>
  </g>
  
  <!-- ACCOUNTS table -->
  <g filter="url(#shadow)">
    <rect x="310" y="100" width="180" height="140" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="310" y="100" width="180" height="32" rx="8" fill="#3b82f6"/>
    <text x="400" y="122" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">ACCOUNTS</text>
    <text x="320" y="150" font-family="monospace" font-size="11" fill="#0f172a">account_id (PK)</text>
    <text x="320" y="168" font-family="monospace" font-size="11" fill="#dc2626">customer_id (FK)</text>
    <text x="320" y="186" font-family="monospace" font-size="11" fill="#64748b">account_type</text>
    <text x="320" y="204" font-family="monospace" font-size="11" fill="#64748b">status</text>
    <text x="320" y="222" font-family="monospace" font-size="11" fill="#64748b">balance</text>
  </g>
  
  <!-- TRANSACTIONS table -->
  <g filter="url(#shadow)">
    <rect x="570" y="100" width="200" height="160" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="570" y="100" width="200" height="32" rx="8" fill="#3b82f6"/>
    <text x="670" y="122" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">TRANSACTIONS</text>
    <text x="580" y="150" font-family="monospace" font-size="11" fill="#0f172a">transaction_id (PK)</text>
    <text x="580" y="168" font-family="monospace" font-size="11" fill="#dc2626">account_id (FK)</text>
    <text x="580" y="186" font-family="monospace" font-size="11" fill="#dc2626">customer_id (FK)</text>
    <text x="580" y="204" font-family="monospace" font-size="11" fill="#64748b">amount</text>
    <text x="580" y="222" font-family="monospace" font-size="11" fill="#64748b">transaction_type</text>
    <text x="580" y="240" font-family="monospace" font-size="11" fill="#64748b">counterparty_*</text>
  </g>
  
