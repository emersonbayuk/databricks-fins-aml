  <text x="267" y="162" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">1:N</text>
  
  <line x1="490" y1="170" x2="565" y2="170" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="527" y="162" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">1:N</text>
  
  <!-- Section: Case Management -->
