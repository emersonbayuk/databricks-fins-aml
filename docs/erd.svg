    <text x="1020" y="150" font-family="monospace" font-size="11" fill="#0f172a">hit_id (PK)</text>
    <text x="1020" y="168" font-family="monospace" font-size="11" fill="#dc2626">list_id (FK)</text>
    <text x="1020" y="186" font-family="monospace" font-size="11" fill="#dc2626">customer_id (FK)</text>
    <text x="1020" y="204" font-family="monospace" font-size="11" fill="#64748b">match_score</text>
  </g>
  
