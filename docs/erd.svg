  <text x="50" y="375" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">CASE MANAGEMENT</text>
  
  <!-- ALERTS table -->
  <g filter="url(#shadow)">
    <rect x="50" y="395" width="160" height="110" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="50" y="395" width="160" height="32" rx="8" fill="#f59e0b"/>
    <text x="130" y="417" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">ALERTS</text>
    <text x="60" y="445" font-family="monospace" font-size="11" fill="#0f172a">alert_id (PK)</text>
    <text x="60" y="463" font-family="monospace" font-size="11" fill="#dc2626">customer_id (FK)</text>
    <text x="60" y="481" font-family="monospace" font-size="11" fill="#64748b">scenario_type</text>
  </g>
  
  <!-- CASES table -->
  <g filter="url(#shadow)">
    <rect x="290" y="395" width="160" height="110" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
