    <rect x="830" y="325" width="150" height="130" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <rect x="830" y="325" width="150" height="32" rx="8" fill="#10b981"/>
    <text x="905" y="347" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">GRAPH_NODES</text>
    <text x="840" y="375" font-family="monospace" font-size="11" fill="#0f172a">node_id (PK)</text>
    <text x="840" y="393" font-family="monospace" font-size="11" fill="#0f172a">node_type (PK)</text>
    <text x="840" y="411" font-family="monospace" font-size="11" fill="#64748b">node_label</text>
    <text x="840" y="429" font-family="monospace" font-size="11" fill="#64748b">risk_score</text>
  </g>
  
  <!-- GRAPH_EDGES table -->
  <g filter="url(#shadow)">
    <rect x="1010" y="325" width="150" height="150" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <rect x="1010" y="325" width="150" height="32" rx="8" fill="#10b981"/>
    <text x="1085" y="347" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">GRAPH_EDGES</text>
    <text x="1020" y="375" font-family="monospace" font-size="11" fill="#dc2626">source_node_id</text>
    <text x="1020" y="393" font-family="monospace" font-size="11" fill="#dc2626">source_node_type</text>
    <text x="1020" y="411" font-family="monospace" font-size="11" fill="#dc2626">target_node_id</text>
    <text x="1020" y="429" font-family="monospace" font-size="11" fill="#dc2626">target_node_type</text>
    <text x="1020" y="447" font-family="monospace" font-size="11" fill="#64748b">edge_type</text>
  </g>
  
  <!-- Arrow: Graph -->
  <line x1="980" y1="390" x2="1005" y2="390" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1005" y1="390" x2="980" y2="390" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="992" y="382" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">N:N</text>
  
  <!-- Legend -->
  <rect x="30" y="540" width="760" height="140" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="50" y="565" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">LEGEND</text>
  
  <rect x="50" y="580" width="16" height="16" fill="#3b82f6" rx="3"/>
  <text x="75" y="593" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Core Entities</text>
  
  <rect x="180" y="580" width="16" height="16" fill="#f59e0b" rx="3"/>
  <text x="205" y="593" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Case Management</text>
  
  <rect x="350" y="580" width="16" height="16" fill="#ec4899" rx="3"/>
  <text x="375" y="593" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Screening</text>
  
  <rect x="470" y="580" width="16" height="16" fill="#10b981" rx="3"/>
  <text x="495" y="593" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Graph Model</text>
  
  <text x="50" y="625" font-family="monospace" font-size="11" fill="#0f172a">column_name (PK)</text>
  <text x="180" y="625" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">= Primary Key</text>
  
  <text x="50" y="650" font-family="monospace" font-size="11" fill="#dc2626">column_name (FK)</text>
  <text x="180" y="650" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">= Foreign Key</text>
  
  <text x="350" y="625" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Target Schema:</text>
  <text x="440" y="625" font-family="monospace" font-size="11" fill="#0f172a">fins_genai.compliance</text>
  
  <text x="350" y="650" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Notebooks:</text>
  <text x="420" y="650" font-family="monospace" font-size="11" fill="#0f172a">01 → 02 → 03 → 04 → 05</text>
</svg>
