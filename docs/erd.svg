  <text x="247" y="442" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">1:1</text>
  
  <line x1="450" y1="450" x2="525" y2="450" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="487" y="442" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">1:N</text>
  
  <!-- Arrow from CUSTOMERS to ALERTS -->
  <path d="M 140 265 L 140 390" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="150" y="330" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">1:N</text>
  
