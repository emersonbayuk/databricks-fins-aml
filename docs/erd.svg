    <text x="370" y="417" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">CASES</text>
    <text x="300" y="445" font-family="monospace" font-size="11" fill="#0f172a">case_id (PK)</text>
    <text x="300" y="463" font-family="monospace" font-size="11" fill="#dc2626">alert_id (FK)</text>
    <text x="300" y="481" font-family="monospace" font-size="11" fill="#64748b">case_status</text>
  </g>
  
