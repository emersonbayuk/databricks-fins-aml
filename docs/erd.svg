    <text x="610" y="417" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">SAR_FILINGS</text>
    <text x="540" y="445" font-family="monospace" font-size="11" fill="#0f172a">sar_id (PK)</text>
    <text x="540" y="463" font-family="monospace" font-size="11" fill="#dc2626">case_id (FK)</text>
    <text x="540" y="481" font-family="monospace" font-size="11" fill="#64748b">fincen_dcn</text>
  </g>
  
