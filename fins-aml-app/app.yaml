name: fins-aml-platform
display_name: "FINS AML Investigation Platform"
description: "AI-powered Anti-Money Laundering investigation platform with executive dashboards and analyst workflows"

command: [
  "uvicorn",
  "main:app",
  "--host=0.0.0.0",
  "--port=8000"
]

resources:
  - name: sql_warehouse
    type: sql_warehouse
    permission: CAN_USE
  - name: serving.serving-endpoints
    permission: CAN_QUERY

env:
  # Resource-bound values (resolved by Databricks Apps runtime)
  - name: 'DATABRICKS_WAREHOUSE_ID'
    valueFrom: sql_warehouse
  - name: 'DATABRICKS_TOKEN'
    valueFrom: secret
  - name: 'NEO4J_PASSWORD'
    valueFrom: secret-2

  # Per-target values — update these when switching targets
  # (must match the active target in databricks.yml)
  - name: 'DATABRICKS_HOSTNAME'
    value: 'e2-demo-west.cloud.databricks.com'
  - name: 'DATABRICKS_WORKSPACE_ID'
    value: '2556758628403379'
  - name: 'DATABRICKS_DASHBOARD_ID'
    value: '01f1175919d61bb89245b4ff377e7e1e'
  - name: 'DATABRICKS_CATALOG'
    value: 'financial_services'
  - name: 'DATABRICKS_SCHEMA'
    value: 'fincrime'
  - name: 'MAS_ENDPOINT_URL'
    value: 'https://e2-demo-west.cloud.databricks.com/serving-endpoints/mas-be073cf6-endpoint/invocations'
  - name: 'NEO4J_URI'
    value: 'neo4j+s://398dd975.databases.neo4j.io'
  - name: 'NEO4J_USER'
    value: 'neo4j'
  - name: 'NEO4J_DATABASE'
    value: 'neo4j'
