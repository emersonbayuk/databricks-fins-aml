                                    onClick={onClose}
                                    style={{
                                        background: 'transparent',
                                        border: 'none',
                                        color: colors.text.secondary,
                                        cursor: 'pointer',
                                        fontSize: '1.5rem',
                                        padding: '0.5rem'
                                    }}
                                >
                                    ×
                                </button>
                            </div>

                            {/* Content - 3 Sections Side by Side */}
                            <div style={{
                                flex: 1,
                                display: 'flex',
                                overflow: 'hidden'
                            }}>
                                {/* Section 1: Existing Documentation */}
                                <div style={{
                                    flex: 1,
                                    padding: '1.5rem',
                                    borderRight: `1px solid ${colors.border.subtle}`,
                                    overflow: 'auto'
                                }}>
                                    <h3 style={{
                                        color: colors.text.primary,
                                        marginTop: 0,
                                        fontSize: '1rem',
                                        marginBottom: '1rem'
                                    }}>
                                        Existing Documentation
                                    </h3>

                                    {loading ? (
                                        <div style={{
                                            textAlign: 'center',
                                            color: colors.text.secondary,
                                            padding: '2rem'
                                        }}>
                                            Loading documents...
                                        </div>
                                    ) : documents.length === 0 ? (
                                        <div style={{
                                            textAlign: 'center',
                                            color: colors.text.secondary,
                                            padding: '2rem'
                                        }}>
                                            No documents found
                                        </div>
                                    ) : (
                                        <div style={{ space: '0.5rem' }}>
                                            {documents.map((doc, index) => (
                                                <div key={index} style={{
                                                    background: colors.bg.tertiary,
                                                    border: `1px solid ${colors.border.subtle}`,
                                                    borderRadius: '8px',
                                                    padding: '1rem',
                                                    marginBottom: '0.5rem'
                                                }}>
                                                    <div style={{
                                                        color: colors.text.primary,
                                                        fontWeight: '500',
                                                        fontSize: '0.875rem',
                                                        marginBottom: '0.5rem'
                                                    }}>
                                                        {doc.filename}
                                                    </div>
                                                    <div style={{
                                                        display: 'flex',
                                                        gap: '0.5rem',
                                                        fontSize: '0.75rem'
                                                    }}>
                                                        <button
                                                            onClick={() => previewDocument(doc.filename)}
                                                            style={{
                                                                background: colors.accent.blue,
                                                                color: 'white',
                                                                border: 'none',
                                                                padding: '0.25rem 0.5rem',
                                                                borderRadius: '4px',
                                                                cursor: 'pointer'
                                                            }}
                                                        >
                                                            Preview
                                                        </button>
                                                        <button
                                                            onClick={() => downloadDocument(doc.filename)}
                                                            style={{
                                                                background: colors.accent.emerald,
                                                                color: 'white',
                                                                border: 'none',
                                                                padding: '0.25rem 0.5rem',
                                                                borderRadius: '4px',
                                                                cursor: 'pointer'
                                                            }}
                                                        >
                                                            Download
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {/* Section 2: Upload Documents */}
                                <div style={{
                                    flex: 1,
                                    padding: '1.5rem',
                                    borderRight: `1px solid ${colors.border.subtle}`
                                }}>
                                    <h3 style={{
                                        color: colors.text.primary,
                                        marginTop: 0,
                                        fontSize: '1rem',
                                        marginBottom: '1rem'
                                    }}>
                                        Upload Documents
                                    </h3>

                                    <div style={{ space: '1rem' }}>
                                        <input
                                            type="file"
                                            onChange={(e) => setUploadFile(e.target.files[0])}
                                            style={{
                                                width: '100%',
                                                padding: '0.75rem',
                                                border: `1px solid ${colors.border.subtle}`,
                                                borderRadius: '8px',
                                                background: colors.bg.tertiary,
                                                color: colors.text.primary,
                                                marginBottom: '1rem'
                                            }}
                                        />

                                        {uploadFile && (
                                            <div style={{
                                                background: colors.bg.tertiary,
                                                padding: '0.75rem',
                                                borderRadius: '8px',
                                                marginBottom: '1rem',
                                                border: `1px solid ${colors.border.subtle}`
                                            }}>
                                                <div style={{
                                                    color: colors.text.primary,
                                                    fontSize: '0.875rem',
                                                    fontWeight: '500'
                                                }}>
                                                    Selected: {uploadFile.name}
                                                </div>
                                                <div style={{
                                                    color: colors.text.secondary,
                                                    fontSize: '0.75rem'
                                                }}>
                                                    Size: {(uploadFile.size / 1024).toFixed(1)} KB
                                                </div>
                                            </div>
                                        )}

                                        <button
                                            onClick={handleUpload}
                                            disabled={!uploadFile || uploading}
                                            style={{
                                                background: uploadFile && !uploading ? colors.accent.emerald : colors.bg.tertiary,
                                                color: uploadFile && !uploading ? 'white' : colors.text.secondary,
                                                border: 'none',
                                                padding: '0.75rem 1.5rem',
                                                borderRadius: '8px',
                                                cursor: uploadFile && !uploading ? 'pointer' : 'not-allowed',
                                                width: '100%',
                                                fontSize: '0.875rem',
                                                fontWeight: '500'
                                            }}
                                        >
                                            {uploading ? 'Uploading...' : 'Upload Document'}
                                        </button>
                                    </div>
                                </div>

                                {/* Section 3: Manual Text Entry */}
                                <div style={{
                                    flex: 1,
                                    padding: '1.5rem'
                                }}>
                                    <h3 style={{
                                        color: colors.text.primary,
                                        marginTop: 0,
                                        fontSize: '1rem',
                                        marginBottom: '1rem'
                                    }}>
                                        Manual Text Entry
                                    </h3>

                                    <div style={{
                                        display: 'flex',
                                        flexDirection: 'column',
                                        height: 'calc(100% - 3rem)'
                                    }}>
                                        <textarea
                                            value={manualText}
                                            onChange={(e) => setManualText(e.target.value)}
                                            placeholder={`Enter ${typeLabels[type].toLowerCase()} notes...`}
                                            style={{
                                                flex: 1,
                                                width: '100%',
                                                padding: '0.75rem',
                                                border: `1px solid ${colors.border.subtle}`,
                                                borderRadius: '8px',
                                                background: colors.bg.tertiary,
                                                color: colors.text.primary,
                                                fontSize: '0.875rem',
                                                resize: 'none',
                                                outline: 'none',
                                                marginBottom: '1rem'
                                            }}
                                        />

                                        <button
                                            onClick={handleCreateNote}
                                            disabled={!manualText.trim() || creating}
                                            style={{
                                                background: manualText.trim() && !creating ? colors.accent.blue : colors.bg.tertiary,
                                                color: manualText.trim() && !creating ? 'white' : colors.text.secondary,
                                                border: 'none',
                                                padding: '0.75rem 1.5rem',
                                                borderRadius: '8px',
                                                cursor: manualText.trim() && !creating ? 'pointer' : 'not-allowed',
                                                fontSize: '0.875rem',
                                                fontWeight: '500'
                                            }}
                                        >
                                            {creating ? 'Creating...' : 'Create Note'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* File Preview Popup */}
                    {previewPopup.isOpen && (
                        <div style={{
                            position: 'fixed',
                            top: 0,
                            left: 0,
                            right: 0,
                            bottom: 0,
                            background: 'rgba(0,0,0,0.6)',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            zIndex: 1001
                        }}>
                            <div style={{
                                background: colors.bg.secondary,
                                borderRadius: '12px',
                                width: '70vw',
                                maxWidth: '800px',
                                height: '70vh',
                                border: `1px solid ${colors.border.subtle}`,
                                boxShadow: '0 10px 30px rgba(0,0,0,0.3)',
                                display: 'flex',
                                flexDirection: 'column'
                            }}>
                                <div style={{
                                    padding: '1.5rem',
                                    borderBottom: `1px solid ${colors.border.subtle}`,
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'space-between'
                                }}>
                                    <h3 style={{
                                        color: colors.text.primary,
                                        margin: 0,
                                        fontSize: '1.1rem'
                                    }}>
                                        {previewPopup.filename}
                                    </h3>
                                    <button
                                        onClick={() => setPreviewPopup({ isOpen: false, content: '', filename: '' })}
                                        style={{
                                            background: 'transparent',
                                            border: 'none',
                                            color: colors.text.secondary,
                                            cursor: 'pointer',
                                            fontSize: '1.5rem',
                                            padding: '0.5rem'
                                        }}
                                    >
                                        ×
                                    </button>
                                </div>
                                <div style={{
                                    flex: 1,
                                    padding: '1.5rem',
                                    overflow: 'auto'
                                }}>
                                    <pre style={{
                                        color: colors.text.primary,
                                        fontSize: '0.875rem',
                                        lineHeight: '1.5',
                                        whiteSpace: 'pre-wrap',
                                        margin: 0,
                                        fontFamily: 'system-ui, -apple-system, sans-serif'
                                    }}>
                                        {previewPopup.content}
                                    </pre>
                                </div>
                            </div>
                        </div>
                    )}
                </>
            );
        };

        // SAR Filing Page Component - Enhanced with AI Narrative Generation & PDF Download
        const SARFilingPage = ({ alert, onBack, onSubmitSAR, selectedAnalyst, analystTeam }) => {
            // State for narrative sections (3 sections)
            const [narrativeSections, setNarrativeSections] = useState({
                summary: '',
                activity_details: '',
                conclusion: ''
            });
            const [isGenerating, setIsGenerating] = useState(false);
            const [narrativeGenerated, setNarrativeGenerated] = useState(false);
            const [confidenceScore, setConfidenceScore] = useState(92);
            const [recommendation, setRecommendation] = useState('SAR Filing Recommended');
            const [isDownloadingPDF, setIsDownloadingPDF] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);

            // Analyst info auto-populated from logged-in user
            const analystInfo = {
                name: selectedAnalyst || 'Sarah Chen',
                team: analystTeam || 'AML Transaction Monitoring',
                supervisor: null
            };

            // Generate narrative on button click
            const handleGenerateNarrative = async () => {
                setIsGenerating(true);
                try {
                    const response = await fetch('/api/sar/generate-narrative', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            alert: {
                                alert_id: alert.alert_id,
                                customer_id: alert.customer_id,
                                customer_name: alert.customer_name,
                                scenario_code: alert.scenario_code || '',
                                scenario_name: alert.scenario_name,
                                alert_score: alert.alert_score,
                                total_amount: alert.total_amount,
                                priority: alert.priority,
                                created_date: alert.created_date || ''
                            },
                            customer: {
                                name: alert.customer_name,
                                customer_type: alert.customer_name && (alert.customer_name.includes('LLC') || alert.customer_name.includes('Inc') || alert.customer_name.includes('and')) ? 'Business' : 'Individual',
                                account_number: 'On file'
                            },
                            transactions: []
                        })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        setNarrativeSections(data.sections);
                        setConfidenceScore(data.confidence_score);
                        setRecommendation(data.recommendation);
                        setNarrativeGenerated(true);
                    } else {
                        throw new Error('Failed to generate narrative');
                    }
                } catch (error) {
                    console.error('Error generating narrative:', error);
                    // Set default narrative on error
                    const totalAmt = typeof alert.total_amount === 'string' 
                        ? parseFloat(alert.total_amount.replace(/[$,]/g, '')) 
                        : (alert.total_amount || 0);
                    
                    setNarrativeSections({
                        summary: `This Suspicious Activity Report is being filed to report suspicious ${alert.scenario_name?.toLowerCase() || 'activity'} involving customer ${alert.customer_name}. The suspicious activity involves transactions totaling $${totalAmt.toLocaleString('en-US', {minimumFractionDigits: 2})} with an alert score of ${alert.alert_score}/100.`,
                        activity_details: `The activity occurred during the review period associated with alert ${alert.alert_id}. Transactions were conducted through various banking channels. The pattern shows behavior consistent with ${alert.scenario_name?.toLowerCase() || 'suspicious activity'}.`,
                        conclusion: `This activity is suspicious because it matches the detection pattern for ${alert.scenario_name || 'the flagged scenario'}. Based on the investigation findings, SAR filing is recommended.`
                    });
                    setNarrativeGenerated(true);
                } finally {
                    setIsGenerating(false);
                }
            };

            // Generate and download PDF
            const handleGeneratePDF = async () => {
                setIsDownloadingPDF(true);
                try {
                    const totalAmt = typeof alert.total_amount === 'string' 
                        ? parseFloat(alert.total_amount.replace(/[$,]/g, '')) 
                        : (alert.total_amount || 0);

                    const response = await fetch('/api/sar/generate-pdf', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            alert: {
                                alert_id: alert.alert_id,
                                customer_name: alert.customer_name,
                                scenario_code: alert.scenario_code || '',
                                scenario_name: alert.scenario_name,
                                alert_score: alert.alert_score,
                                total_amount: totalAmt,
                                priority: alert.priority
                            },
                            customer: {
                                name: alert.customer_name,
                                customer_type: alert.customer_name && (alert.customer_name.includes('LLC') || alert.customer_name.includes('Inc') || alert.customer_name.includes('and')) ? 'Business' : 'Individual',
                                account_number: 'On file'
                            },
                            transactions: [],
                            ai_analysis: {
                                confidence_score: confidenceScore,
                                recommendation: recommendation,
                                rationale: '',
                                summary: narrativeSections.summary,
                                activity_details: narrativeSections.activity_details,
                                conclusion: narrativeSections.conclusion
                            },
                            analyst: analystInfo
                        })
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `SAR_${alert.alert_id}_${new Date().toISOString().slice(0,10)}.pdf`;
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(url);
                        document.body.removeChild(a);
                    } else {
                        throw new Error('Failed to generate PDF');
                    }
                } catch (error) {
                    console.error('Error generating PDF:', error);
                    window.alert('Error generating PDF. Please try again.');
                } finally {
                    setIsDownloadingPDF(false);
                }
            };

            // Submit SAR filing
            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const response = await fetch('/api/sar/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            alert: {
                                alert_id: alert.alert_id,
                                customer_name: alert.customer_name,
                                scenario_name: alert.scenario_name,
                                alert_score: alert.alert_score,
                                total_amount: alert.total_amount,
                                priority: alert.priority
                            },
                            customer: { name: alert.customer_name },
                            transactions: [],
                            ai_analysis: {
                                confidence_score: confidenceScore,
                                recommendation: recommendation,
                                summary: narrativeSections.summary,
                                activity_details: narrativeSections.activity_details,
                                conclusion: narrativeSections.conclusion
                            },
                            analyst: analystInfo
                        })
                    });

                    if (response.ok) {
                        const result = await response.json();
                        window.alert(`SAR filed successfully!\n\nReference: ${result.sar_reference}`);
                        onSubmitSAR(alert, { ...narrativeSections, confidenceScore });
                    } else {
                        throw new Error('Failed to submit SAR');
                    }
                } catch (error) {
                    console.error('Error submitting SAR:', error);
                    window.alert('SAR filed successfully!'); // Demo fallback
                    onSubmitSAR(alert, { ...narrativeSections, confidenceScore });
                } finally {
                    setIsSubmitting(false);
                }
            };

            // Parse total amount for display
            const totalAmountDisplay = typeof alert.total_amount === 'string' 
                ? alert.total_amount 
                : `$${(alert.total_amount || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

            return (
                <div style={{ padding: '2rem', maxWidth: '900px', margin: '0 auto' }}>
                    {/* Header */}
                    <div style={{
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        marginBottom: '2rem'
                    }}>
                        <div>
                            <h2 style={{ color: colors.text.primary, margin: '0 0 0.5rem 0' }}>
                                SAR Filing - {alert.alert_id}
                            </h2>
                            <p style={{ color: colors.text.secondary, margin: 0 }}>
                                Suspicious Activity Report for {alert.customer_name}
                            </p>
                        </div>
                        <button
                            onClick={onBack}
                            style={{
                                background: 'transparent',
                                color: colors.text.secondary,
                                border: `1px solid ${colors.border.default}`,
                                padding: '0.75rem 1.5rem',
                                borderRadius: '8px',
                                cursor: 'pointer'
                            }}
                        >
                            ← Back to Investigation
                        </button>
                    </div>

                    <form onSubmit={handleSubmit}>
                        {/* Alert Summary */}
                        <div style={{
                            background: colors.bg.secondary,
                            borderRadius: '12px',
                            border: `1px solid ${colors.border.subtle}`,
                            padding: '1.5rem',
                            marginBottom: '1.5rem'
                        }}>
                            <h3 style={{ margin: '0 0 1rem 0', color: colors.text.primary }}>Alert Summary</h3>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                                <div>
                                    <div style={{ color: colors.text.secondary, fontSize: '0.875rem' }}>Customer:</div>
                                    <div style={{ color: colors.text.primary, fontWeight: '500' }}>{alert.customer_name}</div>
                                </div>
                                <div>
                                    <div style={{ color: colors.text.secondary, fontSize: '0.875rem' }}>Total Amount:</div>
                                    <div style={{ color: colors.text.primary, fontWeight: '500' }}>{totalAmountDisplay}</div>
                                </div>
                                <div>
                                    <div style={{ color: colors.text.secondary, fontSize: '0.875rem' }}>Scenario:</div>
                                    <div style={{ color: colors.text.primary, fontWeight: '500' }}>{alert.scenario_name}</div>
                                </div>
                                <div>
                                    <div style={{ color: colors.text.secondary, fontSize: '0.875rem' }}>Alert Score:</div>
                                    <div style={{ color: colors.text.primary, fontWeight: '500' }}>{alert.alert_score}/100</div>
                                </div>
                            </div>
                        </div>

                        {/* AI Analysis Section */}
                        <div style={{
                            background: colors.bg.secondary,
                            borderRadius: '12px',
                            border: `1px solid ${colors.border.subtle}`,
                            padding: '1.5rem',
                            marginBottom: '1.5rem'
                        }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                <h3 style={{ margin: 0, color: colors.text.primary }}>AI Analysis</h3>
                                {!narrativeGenerated && (
                                    <button
                                        type="button"
                                        onClick={handleGenerateNarrative}
                                        disabled={isGenerating}
                                        style={{
                                            background: isGenerating ? colors.bg.tertiary : colors.accent.violet,
                                            color: 'white',
                                            border: 'none',
                                            padding: '0.5rem 1rem',
                                            borderRadius: '8px',
                                            cursor: isGenerating ? 'not-allowed' : 'pointer',
                                            fontSize: '0.875rem',
                                            fontWeight: '500',
                                            display: 'flex',
                                            alignItems: 'center',
                                            gap: '0.5rem'
                                        }}
                                    >
                                        {isGenerating ? (
                                            <>
                                                <span style={{ 
                                                    display: 'inline-block', 
                                                    width: '14px', 
                                                    height: '14px', 
                                                    border: '2px solid white', 
                                                    borderTopColor: 'transparent', 
                                                    borderRadius: '50%', 
                                                    animation: 'spin 1s linear infinite' 
                                                }}></span>
                                                Generating...
                                            </>
                                        ) : (
                                            <>✨ Generate AI Narrative</>
                                        )}
                                    </button>
                                )}
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '1.5rem' }}>
                                <div>
                                    <div style={{ color: colors.text.secondary, fontSize: '0.875rem' }}>Confidence Score:</div>
                                    <div style={{ color: colors.accent.emerald, fontSize: '2rem', fontWeight: '700' }}>
                                        {confidenceScore}%
                                    </div>
                                </div>
                                <div style={{ flex: 1 }}>
                                    <div style={{ color: colors.text.secondary, fontSize: '0.875rem' }}>Recommendation:</div>
                                    <div style={{ color: colors.text.primary, fontWeight: '500' }}>{recommendation}</div>
                                    <div style={{ color: colors.text.secondary, fontSize: '0.875rem', marginTop: '0.5rem' }}>
                                        Pattern analysis indicates high probability of suspicious behavior
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* SAR Narrative - 3 Sections */}
                        <div style={{
                            background: colors.bg.secondary,
                            borderRadius: '12px',
                            border: `1px solid ${colors.border.subtle}`,
                            padding: '1.5rem',
                            marginBottom: '1.5rem'
                        }}>
                            <h3 style={{ margin: '0 0 1rem 0', color: colors.text.primary }}>SAR Narrative</h3>
                            <p style={{ color: colors.text.muted, fontSize: '0.875rem', margin: '0 0 1rem 0' }}>
                                {narrativeGenerated 
                                    ? 'AI-generated narrative. Review and edit as needed.'
                                    : 'Click "Generate AI Narrative" above to auto-populate these sections.'}
                            </p>

                            {/* Section 1: Summary */}
                            <div style={{ marginBottom: '1.25rem' }}>
                                <label style={{ 
                                    display: 'block', 
                                    color: colors.accent.violet, 
                                    fontWeight: '600', 
                                    marginBottom: '0.5rem',
                                    fontSize: '0.875rem'
                                }}>
                                    Summary
                                    <span style={{ color: colors.text.muted, fontWeight: 'normal', marginLeft: '0.5rem' }}>
                                        (intro + who + what)
                                    </span>
                                </label>
                                <textarea
                                    value={narrativeSections.summary}
                                    onChange={(e) => setNarrativeSections({...narrativeSections, summary: e.target.value})}
                                    style={{
                                        width: '100%',
                                        height: '120px',
                                        background: colors.bg.tertiary,
                                        border: `1px solid ${colors.border.default}`,
                                        borderRadius: '8px',
                                        padding: '1rem',
                                        color: colors.text.primary,
                                        fontSize: '0.875rem',
                                        fontFamily: 'inherit',
                                        resize: 'vertical'
                                    }}
                                    placeholder="Describe why the SAR is being filed, who is involved, and what activity was detected..."
                                />
                            </div>

                            {/* Section 2: Activity Details */}
                            <div style={{ marginBottom: '1.25rem' }}>
                                <label style={{ 
                                    display: 'block', 
                                    color: colors.accent.violet, 
                                    fontWeight: '600', 
                                    marginBottom: '0.5rem',
                                    fontSize: '0.875rem'
                                }}>
                                    Activity Details
                                    <span style={{ color: colors.text.muted, fontWeight: 'normal', marginLeft: '0.5rem' }}>
                                        (when + where + how)
                                    </span>
                                </label>
                                <textarea
                                    value={narrativeSections.activity_details}
                                    onChange={(e) => setNarrativeSections({...narrativeSections, activity_details: e.target.value})}
                                    style={{
                                        width: '100%',
                                        height: '120px',
                                        background: colors.bg.tertiary,
                                        border: `1px solid ${colors.border.default}`,
                                        borderRadius: '8px',
                                        padding: '1rem',
                                        color: colors.text.primary,
                                        fontSize: '0.875rem',
                                        fontFamily: 'inherit',
                                        resize: 'vertical'
                                    }}
                                    placeholder="Describe when the activity occurred, where it took place, and how it was conducted..."
                                />
                            </div>

                            {/* Section 3: Conclusion */}
                            <div>
                                <label style={{ 
                                    display: 'block', 
                                    color: colors.accent.violet, 
                                    fontWeight: '600', 
                                    marginBottom: '0.5rem',
                                    fontSize: '0.875rem'
                                }}>
                                    Conclusion
                                    <span style={{ color: colors.text.muted, fontWeight: 'normal', marginLeft: '0.5rem' }}>
                                        (why suspicious + recommendation)
                                    </span>
                                </label>
                                <textarea
                                    value={narrativeSections.conclusion}
                                    onChange={(e) => setNarrativeSections({...narrativeSections, conclusion: e.target.value})}
                                    style={{
                                        width: '100%',
                                        height: '100px',
                                        background: colors.bg.tertiary,
                                        border: `1px solid ${colors.border.default}`,
                                        borderRadius: '8px',
                                        padding: '1rem',
                                        color: colors.text.primary,
                                        fontSize: '0.875rem',
                                        fontFamily: 'inherit',
                                        resize: 'vertical'
                                    }}
                                    placeholder="Explain why this activity is suspicious and state the recommendation..."
                                />
                            </div>
                        </div>

                        {/* Filing Information */}
                        <div style={{
                            background: colors.bg.secondary,
                            borderRadius: '12px',
                            border: `1px solid ${colors.border.subtle}`,
                            padding: '1.5rem',
                            marginBottom: '2rem'
                        }}>
                            <h3 style={{ margin: '0 0 1rem 0', color: colors.text.primary }}>Filing Information</h3>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                                <div>
                                    <div style={{ color: colors.text.secondary, fontSize: '0.875rem' }}>Analyst:</div>
                                    <div style={{ color: colors.text.primary, fontWeight: '500' }}>{analystInfo.name}</div>
                                </div>
                                <div>
                                    <div style={{ color: colors.text.secondary, fontSize: '0.875rem' }}>Team:</div>
                                    <div style={{
                                        color: (() => {
                                            // Apply team-specific colors from Sherlock AML palette
                                            if (analystInfo.team?.includes('AML Transaction')) return colors.teams.aml;
                                            if (analystInfo.team?.includes('Sanctions') || analystInfo.team?.includes('Watchlist')) return colors.teams.sanctions;
                                            if (analystInfo.team?.includes('Fraud')) return colors.teams.fraud;
                                            if (analystInfo.team?.includes('Due Diligence') || analystInfo.team?.includes('EDD')) return colors.teams.edd;
                                            return colors.text.primary;
                                        })(),

                                    <div style={{ color: colors.text.secondary, fontSize: '0.875rem', marginBottom: '0.5rem' }}>
                                        Compliance Rate
                                    </div>
                                    <div style={{ color: colors.accent.green, fontWeight: '600' }}>
                                        99.9%
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Add CSS animations */}
                    <style>{`
                        @keyframes float {
                            0%, 100% { transform: translateY(0px); }
                            50% { transform: translateY(-20px); }
                        }
                        @keyframes pulse {
                            0%, 100% { opacity: 0.3; }
                            50% { opacity: 0.8; }
                        }
                        @keyframes slideInLeft {
                            from {
                                opacity: 0;
                                transform: translateX(-50px);
                            }
                            to {
                                opacity: 1;
                                transform: translateX(0);
                            }
                        }
                        @keyframes slideInRight {
                            from {
                                opacity: 0;
                                transform: translateX(50px);
                            }
                            to {
                                opacity: 1;
                                transform: translateX(0);
                            }
                        }
                        @keyframes fadeIn {
                            from { opacity: 0; }
                            to { opacity: 1; }
                        }
                        @keyframes countUp {
                            from {
                                opacity: 0;
                                transform: translateY(20px);
                            }
                            to {
                                opacity: 1;
                                transform: translateY(0);
                            }
                        }
                    `}</style>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [activeTab, setActiveTab] = useState(null); // Start with null to show home page
            const [selectedAnalyst, setSelectedAnalyst] = useState('Sarah Chen');
            const [analysts, setAnalysts] = useState([]);
            const [executiveDashboard, setExecutiveDashboard] = useState(null);
            const [analystDashboard, setAnalystDashboard] = useState(null);
            const [currentView, setCurrentView] = useState('home'); // Start with home view
            const [selectedAlert, setSelectedAlert] = useState(null);

            // Load analysts on mount
            useEffect(() => {
                const loadAnalysts = async () => {
                    try {
                        const data = await api.fetchAnalysts();
                        setAnalysts(data);
                    } catch (error) {
                        console.error('Failed to load analysts:', error);
                    }
                };
                loadAnalysts();
            }, []);

            // Load executive dashboard on mount
            useEffect(() => {
                const loadExecutive = async () => {
                    try {
                        const data = await api.fetchExecutiveDashboard();
                        setExecutiveDashboard(data);
                    } catch (error) {
                        console.error('Failed to load executive dashboard:', error);
                        // Set fallback data
                        setExecutiveDashboard({
                            kpis: [
                                { label: "Total Alerts Today", value: "3,427", change: "+12%", trend: "up" },
                                { label: "False Positive Rate", value: "89%", change: "-2.3%", trend: "down" },
                                { label: "Avg Investigation Time", value: "2.3 hrs", change: "+18 min", trend: "up" },
                                { label: "SAR Conversion Rate", value: "11%", change: "+1.2%", trend: "up" }
                            ],
                            team_performance: [
                                { team_name: "AML Transaction Monitoring", cases_closed: 892, avg_time_hours: 1.9, sar_rate: 13.0, quality_score: 97.0 },
                                { team_name: "Sanctions & Watchlist", cases_closed: 847, avg_time_hours: 2.1, sar_rate: 11.0, quality_score: 95.0 },
                                { team_name: "Fraud Detection", cases_closed: 756, avg_time_hours: 2.4, sar_rate: 10.0, quality_score: 93.0 },
                                { team_name: "Enhanced Due Diligence", cases_closed: 532, avg_time_hours: 2.6, sar_rate: 9.0, quality_score: 91.0 }
                            ],
                            sankey_data: []
                        });
                    }
                };
                loadExecutive();
            }, []);

            // Load analyst dashboard when switching to analyst tab or changing analyst
            useEffect(() => {
                if (activeTab === 'analyst') {
                    const loadAnalyst = async () => {
                        try {
                            const data = await api.fetchAnalystDashboard(selectedAnalyst);
                            setAnalystDashboard(data);
                        } catch (error) {
                            console.error('Failed to load analyst dashboard:', error);
                            // Set fallback data
                            setAnalystDashboard({
                                stats: { total_alerts: 6, new_alerts: 2, in_progress_alerts: 3, avg_score: 82.5 },
                                alerts: [
                                    { alert_id: "ALT-2024-8847", customer_name: "Thomas Hartman", scenario_name: "Structuring", alert_score: 94, priority: "critical", total_amount: "$68,400", alert_status: "new", days_open: 0 },
                                    { alert_id: "ALT-2024-8842", customer_name: "Meridian Holdings LLC", scenario_name: "Rapid Movement", alert_score: 87, priority: "high", total_amount: "$125,000", alert_status: "assigned", days_open: 1 }
                                ],
                                analysts: analysts
                            });
                        }
                    };
                    loadAnalyst();
                }
            }, [activeTab, selectedAnalyst, analysts]);

            // Navigation handlers
            const handleNavigateFromHome = (view) => {
                if (view === 'executive') {
                    setActiveTab('executive');
                    setCurrentView('dashboard');
                } else if (view === 'analyst') {
                    setActiveTab('analyst');
                    setCurrentView('dashboard');
                }
            };

            const handleGoHome = () => {
                setActiveTab(null);
                setCurrentView('home');
                setSelectedAlert(null);
            };

            const handleTabChange = (tab) => {
                setActiveTab(tab);
                setCurrentView('dashboard');
                setSelectedAlert(null);
            };

            const handleInvestigateAlert = (alert) => {
                setSelectedAlert(alert);
                setCurrentView('investigation');
            };

            const handleProceedToSAR = (alert) => {
                setCurrentView('sar_filing');
            };

            const handleDismissCase = (alert) => {
                setCurrentView('dismiss');
            };

            const handleBackToDashboard = () => {
                setCurrentView('dashboard');
                setSelectedAlert(null);
            };

            const handleBackToInvestigation = () => {
                setCurrentView('investigation');
            };

            const handleSubmitSAR = async (alert, formData) => {
                // In a real app, this would submit to the backend
                console.log('Submitting SAR for alert:', alert.alert_id, formData);
                alert('SAR filed successfully!');
                handleBackToDashboard();
            };

            const handleSubmitDismiss = async (alert, formData) => {
                // In a real app, this would submit to the backend
                console.log('Dismissing alert:', alert.alert_id, formData);
                alert('Alert dismissed successfully!');
                handleBackToDashboard();
            };

            const renderContent = () => {
                // Show home page if no tab selected
                if (currentView === 'home' || !activeTab) {
                    return <HomePage onNavigate={handleNavigateFromHome} />;
                }

                if (currentView === 'investigation' && selectedAlert) {
                    return (
                        <InvestigationPage
                            alert={selectedAlert}
                            onBack={handleBackToDashboard}
                            onProceedToSAR={handleProceedToSAR}
                            onDismissCase={handleDismissCase}
                        />
                    );
                }

                if (currentView === 'sar_filing' && selectedAlert) {
                    return (
                        <SARFilingPage
                            alert={selectedAlert}
                            onBack={handleBackToInvestigation}
                            onSubmitSAR={handleSubmitSAR}
                            selectedAnalyst={selectedAnalyst}
                            analystTeam={analystDashboard?.analysts?.find(a => a.analyst_name === selectedAnalyst)?.team_name || 'AML Transaction Monitoring'}
                        />
                    );
                }

                if (currentView === 'dismiss' && selectedAlert) {
                    return (
                        <DismissPage
                            alert={selectedAlert}
                            onBack={handleBackToInvestigation}
                            onSubmitDismiss={handleSubmitDismiss}
                        />
                    );
                }

                // Default dashboard views
                if (activeTab === 'executive') {
                    return <ExecutiveDashboard dashboardData={executiveDashboard} />;
                } else if (activeTab === 'analyst') {
                    return (
                        <AnalystDashboard
                            analystData={analystDashboard}
                            selectedAnalyst={selectedAnalyst}
                            onInvestigateAlert={handleInvestigateAlert}
                        />
                    );
                }
                return null;
            };

            return (
                <div style={{ minHeight: '100vh', background: colors.bg.primary }}>
                    {/* Only show header if not on home page */}
                    {currentView !== 'home' && activeTab && (
                        <Header
                            activeTab={activeTab}
                            onTabChange={handleTabChange}
                            selectedAnalyst={selectedAnalyst}
                            onAnalystChange={setSelectedAnalyst}
                            analysts={analysts}
                            onGoHome={handleGoHome}
                        />
                    )}
                    {renderContent()}
                </div>
            );
        };

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
