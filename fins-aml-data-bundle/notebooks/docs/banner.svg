<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="#0f172a"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.15">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#334155" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#334155" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#334155" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#334155" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#334155" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke="#334155" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="200" stroke="#334155" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke="#334155" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="200" stroke="#334155" stroke-width="0.5"/>
  </g>
  
  <!-- Shield icon background -->
  <rect x="40" y="50" width="100" height="100" rx="16" fill="#334155" opacity="0.5"/>
  
  <!-- Shield icon -->
  <g transform="translate(55, 60)">
    <path d="M35 5 L65 15 L65 40 C65 60 50 75 35 80 C20 75 5 60 5 40 L5 15 Z" 
          fill="#818cf8" opacity="0.9"/>
    <path d="M35 20 L35 50 M25 35 L45 35" 
          stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Main title -->
  <text x="170" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#f8fafc">
    SherlockAML
  </text>
  
  <!-- Tagline -->
  <text x="170" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8">
    AI-Powered Anti-Money Laundering Investigation Platform
  </text>
  
  <!-- Accent line -->
  <rect x="170" y="145" width="120" height="3" rx="1.5" fill="#6366f1"/>
</svg>
