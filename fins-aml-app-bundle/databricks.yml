bundle:
  name: fins-aml-platform

variables:
  databricks_hostname:
    description: "Databricks workspace hostname (no https://)"
  workspace_id:
    description: "Databricks workspace ID (numeric)"
  warehouse_id:
    description: "SQL warehouse ID"
  mas_endpoint_url:
    description: "MAS agent serving endpoint URL"
    default: ""
  dashboard_id:
    description: "Lakeview dashboard ID"
    default: ""
  catalog:
    description: "Unity Catalog name"
    default: "fins_aml"
  schema:
    description: "Schema name"
    default: "data_generation"
  use_lakebase:
    description: "Toggle Postgres-backed graph reads (true/false). Default false keeps SQL-warehouse path."
    default: "false"
  lakebase_host:
    description: "Lakebase endpoint host (e.g. ep-xxx.database.us-east-1.cloud.databricks.com)"
    default: ""
  lakebase_database:
    description: "Lakebase database name"
    default: ""
  lakebase_endpoint_path:
    description: "Lakebase endpoint resource path (projects/<id>/branches/<id>/endpoints/<id>)"
    default: ""

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fe-vm-industry-solutions-buildathon.cloud.databricks.com
    variables:
      databricks_hostname: "fe-vm-industry-solutions-buildathon.cloud.databricks.com"
      workspace_id: "237438879023004"
      warehouse_id: "<current-warehouse-id>"
      mas_endpoint_url: "https://fe-vm-industry-solutions-buildathon.cloud.databricks.com/serving-endpoints/mas-e3a6f805-endpoint/invocations"
      dashboard_id: "01f0ef2a97ed176dbe998b9ec4577b1b"

  e2-demo-west:
    workspace:
      host: https://e2-demo-west.cloud.databricks.com
    variables:
      databricks_hostname: "e2-demo-west.cloud.databricks.com"
      workspace_id: "2556758628403379"
      warehouse_id: "75fd8278393d07eb"
      mas_endpoint_url: "https://e2-demo-west.cloud.databricks.com/serving-endpoints/mas-be073cf6-endpoint/invocations"
      dashboard_id: "01f1175919d61bb89245b4ff377e7e1e"
      catalog: "financial_services"
      schema: "fincrime"

  fevm-fins-demo:
    workspace:
      host: https://fevm-fins-demo.cloud.databricks.com
    variables:
      databricks_hostname: "fevm-fins-demo.cloud.databricks.com"
      workspace_id: "7474649573853836"
      warehouse_id: "d5080ca821238922"
      dashboard_id: "01f127b9372c1c4f850385353803dd0f"
      mas_endpoint_url: "https://fevm-fins-demo.cloud.databricks.com/serving-endpoints/mas-c499756e-endpoint/invocations"
      # Lakebase: provisioned 2026-05-12, snapshot of graph_nodes/graph_edges
      lakebase_host: "ep-steep-block-d2vri3pw.database.us-east-1.cloud.databricks.com"
      lakebase_database: "fins_aml_graph"
      lakebase_endpoint_path: "projects/fins-aml-graph/branches/production/endpoints/primary"
      # use_lakebase intentionally left as default "false" — flip after smoke test

resources:
  apps:
    fins-aml-platform:
      name: "fins-aml-platform"
      description: "AI-powered AML Investigation Platform"
      source_code_path: .
